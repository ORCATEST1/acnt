<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

        display: flex;
        flex-direction: column;

    .ascnt-modal-head {
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid #E5E7EB;

        align-items: flex-start;
        flex-shrink: 0;

    .ascnt-modal-close {

    }
    .ascnt-modal-close:hover { color: #111827; }
    .ascnt-product-select {
        width: 100%;
        font-family: 'Inter', sans-serif;
        font-size: 0.875rem;
        font-weight: 500;
        color: #111827;
        background: #F9FAFB;
        border: 1px solid #E5E7EB;
        border-radius: 6px;
        padding: 0.5rem 0.75rem;
        cursor: pointer;
        appearance: none;

        background-position: right 0.75rem center;
        padding-right: 2rem;

    .ascnt-product-select:focus { outline: none; border-color: #2563EB; }
    .ascnt-modal-lot { font-size: 0.75rem; color: #9CA3AF; margin-top: 0.4rem; }
    .ascnt-modal-body { padding: 1.25rem 1.5rem; overflow-y: auto; }

        border-bottom: 1px solid #F3F4F6;
        font-size: 0.8125rem;

    .ascnt-coa-key { font-weight: 500; color: #4B5563; min-width: 155px; flex-shrink: 0; }

        background: #EFF6FF;

        border-radius: 8px;

        font-size: 0.8rem;
        color: #4B5563;
        line-height: 1.6;

function ascntOpenCOA() {
    document.getElementById('ascnt-coa-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
    ascntRenderCOA(document.getElementById('ascnt-product-select').value);
}

function ascntCloseCOA() {
    document.getElementById('ascnt-coa-modal').classList.remove('open');
    document.body.style.overflow = '';
}

function ascntRenderCOA(key) {
    var d = ASCNT_COA[key];
    if (!d) return;
    document.getElementById('ascnt-coa-lot').textContent = d.lot;
    document.getElementById('ascnt-coa-body').innerHTML =
        d.rows.map(function(r) {
            return '<div class="ascnt-coa-row"><span class="ascnt-coa-key">' + r[0] + '</span><span class="ascnt-coa-val">' + r[1] + '</span></div>';
        }).join('') +
        '<div class="ascnt-coa-storage"><strong>Storage &amp; Stability</strong><br>' + d.storage + '</div>';
}
